<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmar Pago | Traemos Todo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/styles.css">
</head>

<body>

<header class="site-header">
  <div class="container">
    <h1 style="position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;">
      Traemos Todo
    </h1>
    <a href="index.html" class="logo">
      <img src="images/logo.webp" alt="YourStore - Traemos Todo" width="140" height="40">
    </a>
    <nav class="main-nav">
      <h2 class="subtitle">Confirmación de pago</h2>
    </nav>
  </div>
</header>

<main class="checkout-container">
  <div class="checkout-wrapper">

    <!-- Resumen del pedido -->
    <div class="checkout-form-section">
      <h1>🧾 Resumen del pedido</h1>

      <div class="checkout-cart" id="paymentCart">
        <p class="loading">Cargando carrito...</p>
      </div>

      <div class="checkout-totals">
        <div class="totals-row totals-total">
          <span>Total a pagar</span>
          <span id="paymentTotal">$ 0</span>
        </div>
      </div>
    </div>

    <!-- Método de pago y acción -->
    <div class="checkout-summary-section">
      <h2>💳 Método de pago</h2>

      <div class="payment-method-box">
        <p id="paymentMethod" class="payment-method-label">—</p>
      </div>

      <div class="payment-security">
        <span>🔒</span>
        <p>Tu pago está protegido con cifrado seguro.</p>
      </div>

      <button id="payBtn" class="btn-primary btn-large">
        Confirmar y pagar
      </button>

      <p id="paymentStatus" class="payment-status"></p>

      <a href="checkout.html" class="btn-secondary btn-large" style="margin-top: 0.5rem; text-decoration:none; display:flex; justify-content:center;">
        ← Volver al checkout
      </a>
    </div>

  </div>
</main>

<script type="module" src="scripts/pago.js"></script>

</body>
</html>
